services:
  postgres:
    image: postgres:16
    container_name: grua-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build: ./services/auth-service
    container_name: grua-auth-service
    env_file:
      - .env
    environment:
      SERVICE_PORT: ${AUTH_SERVICE_PORT:-8001}
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/auth_db
    ports:
      - "8001:8001"
    volumes:
      - ./seed-data:/app/seed-data:ro
    depends_on:
      postgres:
        condition: service_healthy

  dispatch-service:
    build: ./services/dispatch-service
    container_name: grua-dispatch-service
    env_file:
      - .env
    environment:
      SERVICE_PORT: ${DISPATCH_SERVICE_PORT:-8002}
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/dispatch_db
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy

  fleet-service:
    build: ./services/fleet-service
    container_name: grua-fleet-service
    env_file:
      - .env
    environment:
      SERVICE_PORT: ${FLEET_SERVICE_PORT:-8003}
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/fleet_db
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy

  clients-service:
    build: ./services/clients-service
    container_name: grua-clients-service
    env_file:
      - .env
    environment:
      SERVICE_PORT: ${CLIENTS_SERVICE_PORT:-8004}
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/clients_db
    ports:
      - "8004:8004"
    volumes:
      - ./seed-data:/app/seed-data:ro
    depends_on:
      postgres:
        condition: service_healthy

  media-service:
    build: ./services/media-service
    container_name: grua-media-service
    env_file:
      - .env
    environment:
      SERVICE_PORT: ${MEDIA_SERVICE_PORT:-8005}
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/media_db
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:-https://example.r2.cloudflarestorage.com}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-change-me}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-change-me}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-grua-media}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}
      ALLOWED_IMAGE_MIME_TYPES: ${ALLOWED_IMAGE_MIME_TYPES:-image/jpeg,image/png,image/webp}
      PUBLIC_ENTITY_TYPES: ${PUBLIC_ENTITY_TYPES:-clients,users}
      SIGNED_ENTITY_TYPES: ${SIGNED_ENTITY_TYPES:-trips,dispatch}
      R2_SIGNED_URL_EXPIRE_SECONDS: ${R2_SIGNED_URL_EXPIRE_SECONDS:-3600}
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build: ./gateway
    container_name: grua-gateway
    env_file:
      - .env
    environment:
      SERVICE_PORT: ${GATEWAY_PORT:-8000}
      AUTH_SERVICE_URL: http://auth-service:8001
      DISPATCH_SERVICE_URL: http://dispatch-service:8002
      FLEET_SERVICE_URL: http://fleet-service:8003
      CLIENTS_SERVICE_URL: http://clients-service:8004
      MEDIA_SERVICE_URL: http://media-service:8005
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - dispatch-service
      - fleet-service
      - clients-service
      - media-service

volumes:
  postgres_data:
